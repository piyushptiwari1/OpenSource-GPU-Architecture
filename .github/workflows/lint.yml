name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff format (check)
        run: ruff format --check .

      - name: ruff lint
        run: ruff check .

      - name: mypy
        run: mypy --install-types --non-interactive tools || true
        # tools/ is empty in initial bootstrap; mypy must not fail the build
        # while we are still scaffolding. Switch to `mypy tools` (no `|| true`)
        # once tools/opengpu_tools/ has its first module.

  systemverilog:
    name: SystemVerilog (verible + slang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install verible
        run: |
          set -euo pipefail
          VERSION="v0.0-3947-g28737a13"
          ARCHIVE="verible-${VERSION}-linux-static-x86_64.tar.gz"
          curl -fsSL -o /tmp/verible.tar.gz \
            "https://github.com/chipsalliance/verible/releases/download/${VERSION}/${ARCHIVE}"
          mkdir -p /tmp/verible
          tar -xzf /tmp/verible.tar.gz -C /tmp/verible --strip-components=1
          sudo install -m 0755 /tmp/verible/bin/* /usr/local/bin/
          verible-verilog-lint --version
          verible-verilog-format --version

      - name: List SystemVerilog sources
        id: list
        run: |
          mapfile -t SV_FILES < <(git ls-files 'src/**/*.sv' 'src/**/*.svh' \
                                              'test/**/*.sv' 'test/**/*.svh' || true)
          printf '%s\n' "${SV_FILES[@]}" > sv_files.txt
          echo "count=${#SV_FILES[@]}" >> "$GITHUB_OUTPUT"
          cat sv_files.txt

      - name: verible-verilog-format (check only)
        if: steps.list.outputs.count != '0'
        run: |
          set +e
          xargs -a sv_files.txt -r verible-verilog-format \
            --flagfile=tools/lint/verible.fmt --verify
          # PR-55 enterprise modules + upstream files are not yet
          # reformatted; treat formatter as advisory until the
          # baseline reformat lands. This will be flipped to a hard
          # failure in a follow-up PR.
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::verible-verilog-format reported diffs (advisory)."
          fi
          exit 0

      - name: verible-verilog-lint
        if: steps.list.outputs.count != '0'
        run: |
          set +e
          xargs -a sv_files.txt -r verible-verilog-lint \
            --rules_config tools/lint/verible.rules
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::verible-verilog-lint reported issues (advisory during bootstrap)."
          fi
          # Promote to hard failure once the existing tree is clean.
          exit 0

      - name: Install slang
        run: |
          set -euo pipefail
          SLANG_VERSION="v8.1"
          curl -fsSL -o /tmp/slang.tar.gz \
            "https://github.com/MikePopoloski/slang/releases/download/${SLANG_VERSION}/slang-linux-x86_64.tar.gz" \
            || curl -fsSL -o /tmp/slang.tar.gz \
            "https://github.com/MikePopoloski/slang/releases/latest/download/slang-linux-x86_64.tar.gz"
          mkdir -p /tmp/slang
          tar -xzf /tmp/slang.tar.gz -C /tmp/slang --strip-components=1 || \
            tar -xzf /tmp/slang.tar.gz -C /tmp/slang
          sudo install -m 0755 $(find /tmp/slang -name slang -type f | head -1) /usr/local/bin/slang
          slang --version

      - name: slang parse (advisory)
        if: steps.list.outputs.count != '0'
        run: |
          set +e
          slang --lint-only -Wno-unused-def -Wno-empty-member \
                $(cat sv_files.txt)
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::slang reported issues (advisory during bootstrap)."
          fi
          exit 0

  metadata:
    name: Repository metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CITATION.cff
        uses: citation-file-format/cffconvert-github-action@4cf11baa70a673bfdf9dad0acc7ee33b3f4b6084  # v2.0.0
        with:
          args: "--validate"

      - name: Check required files
        run: |
          set -e
          for f in LICENSE README.md CHANGES.md CONTRIBUTING.md \
                   CODE_OF_CONDUCT.md SECURITY.md MAINTAINERS.md \
                   CITATION.cff .env.example .editorconfig; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done

      - name: Forbid committed secrets / .env
        run: |
          if git ls-files | grep -E '^(\.env(\.|$)|.*\.pem$|.*\.key$)' \
              | grep -v '^\.env\.example$'; then
            echo "Found a committed env / secret file."
            exit 1
          fi
