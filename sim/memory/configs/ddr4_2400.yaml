# DDR4-2400 generic configuration.
# Sourced from JEDEC JESD79-4 timing for 1Gb x8 die at 1200 MHz tCK.
# This file is read by sim/memory/dram_bfm.py and (when enabled) the
# native Ramulator2 backend.
name: ddr4_2400
channels: 1
ranks: 1
banks_per_rank: 16
capacity_mib: 4096          # 4 GiB per rank (2 Gbit x16 die x16 banks)
bus_width_bits: 64
burst_length: 8
timing:
  tck_ps: 833                # 1 / 1200 MHz
  read_latency_ck: 17        # CL = 17 cycles at 2400 MT/s
  write_latency_ck: 12       # CWL = 12
  ras_ck: 17                 # tRAS in cycles
  rcd_ck: 17                 # tRCD in cycles
  rp_ck: 17                  # tRP in cycles
  refresh_period_us: 7.8
ramulator2:
  preset: DDR4
  org: DDR4_4Gb_x8
  speed: DDR4_2400R
